<app-month-selector
  [month]="currentMonth()"
  (monthChange)="onMonthChange($event)"
/>

<div class="px-4 space-y-4">
  <div class="bg-slate-800 rounded-lg p-6 text-center">
    <p class="text-slate-400 text-sm mb-1">Odpracované hodiny</p>
    <p class="text-4xl font-bold text-cyan-400">{{ summary().totalHours }}h</p>
  </div>

  <div class="bg-slate-800 rounded-lg p-6 text-center">
    <p class="text-slate-400 text-sm mb-1">Hodinová sadzba</p>
    <p class="text-2xl font-semibold text-white">{{ summary().hourlyRate }} €</p>
  </div>

  <div class="bg-slate-800 rounded-lg p-6 text-center">
    <p class="text-slate-400 text-sm mb-1">Celková suma</p>
    <p class="text-4xl font-bold text-green-400">{{ summary().totalAmount }} €</p>
  </div>
</div>
