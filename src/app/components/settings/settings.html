<div class="px-5 pt-5">
  <h2 class="text-[11px] font-medium text-ink-faint uppercase tracking-wider mb-4">Nastavenia</h2>

  <div class="bg-surface rounded-xl border border-rule p-5">
    <label class="block text-sm font-medium text-ink mb-3">
      Hodinová sadzba
    </label>
    <div class="flex gap-3 items-center">
      <div class="relative flex-1">
        <input
          type="number"
          [ngModel]="hourlyRate()"
          (ngModelChange)="hourlyRate.set($event)"
          min="0"
          step="1"
          class="w-full bg-cream border border-rule rounded-lg pl-3 pr-8 py-2.5 text-lg font-mono text-ink text-right focus:border-accent focus:ring-1 focus:ring-accent/20 focus:outline-none transition-colors"
        />
        <span class="absolute right-3 top-1/2 -translate-y-1/2 text-ink-faint text-sm font-mono">€</span>
      </div>
      <button
        (click)="save()"
        class="bg-accent hover:bg-accent/90 text-white h-[44px] px-6 rounded-lg font-medium text-sm cursor-pointer transition-colors active:scale-[0.97]"
      >
        Uložiť
      </button>
    </div>

    @if (saved()) {
      <p class="text-accent text-sm mt-3 font-medium flex items-center gap-1.5">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Uložené
      </p>
    }
  </div>
</div>
