<app-month-selector
  [month]="currentMonth()"
  (monthChange)="onMonthChange($event)"
/>

<!-- Add form -->
<div class="px-5 mb-5">
  <div class="bg-surface rounded-xl border border-rule p-4">
    <div class="space-y-3 mb-3">
      <div>
        <label class="block text-[11px] font-medium text-ink-faint uppercase tracking-wider mb-1.5">Dátum</label>
        <input
          type="date"
          [ngModel]="newDate()"
          (ngModelChange)="newDate.set($event)"
          class="w-full bg-cream border border-rule rounded-lg px-3 py-2.5 text-sm text-ink font-mono focus:border-accent focus:ring-1 focus:ring-accent/20 focus:outline-none transition-colors"
        />
      </div>
      <div>
        <label class="block text-[11px] font-medium text-ink-faint uppercase tracking-wider mb-1.5">Hodiny</label>
        <input
          type="number"
          [ngModel]="newHours()"
          (ngModelChange)="newHours.set($event)"
          placeholder="0"
          step="0.5"
          min="0"
          max="24"
          class="w-full bg-cream border border-rule rounded-lg px-3 py-2.5 text-sm text-ink font-mono focus:border-accent focus:ring-1 focus:ring-accent/20 focus:outline-none transition-colors"
        />
      </div>
    </div>
    <button
      (click)="addEntry()"
      class="w-full bg-accent hover:bg-accent/90 text-white py-2.5 rounded-lg font-medium text-sm cursor-pointer transition-colors active:scale-[0.98]"
    >
      Pridať
    </button>
  </div>
</div>

<!-- Entries list -->
<div class="px-5">
  @for (entry of entries(); track entry.id) {
    <div class="ledger-rule">
      @if (editingId() === entry.id) {
        <!-- Edit mode -->
        <div class="flex items-center gap-3 py-3">
          <input
            type="date"
            [ngModel]="editDate()"
            (ngModelChange)="editDate.set($event)"
            class="flex-1 bg-cream border border-rule rounded-lg px-2.5 py-2 text-sm font-mono text-ink focus:border-accent focus:outline-none"
          />
          <input
            type="number"
            [ngModel]="editHours()"
            (ngModelChange)="editHours.set($event)"
            step="0.5"
            min="0"
            max="24"
            class="w-16 bg-cream border border-rule rounded-lg px-2 py-2 text-sm font-mono text-ink text-center focus:border-accent focus:outline-none"
          />
          <div class="flex gap-1">
            <button
              (click)="saveEdit()"
              class="w-8 h-8 flex items-center justify-center rounded-full text-accent hover:bg-accent-light cursor-pointer transition-colors"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button
              (click)="cancelEdit()"
              class="w-8 h-8 flex items-center justify-center rounded-full text-ink-faint hover:bg-cream-dark cursor-pointer transition-colors"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
      } @else {
        <!-- View mode -->
        <div class="flex items-center justify-between py-3 group">
          <span class="text-sm text-ink-light font-mono tabular-nums">{{ entry.date | date:'dd.MM.yyyy' }}</span>
          <div class="flex items-center gap-3">
            <span class="text-sm font-mono font-medium text-accent tabular-nums">{{ entry.hours }}h</span>
            <div class="flex gap-0.5">
              <button
                (click)="startEdit(entry)"
                class="w-7 h-7 flex items-center justify-center rounded-full text-ink-faint hover:text-ink hover:bg-cream-dark cursor-pointer transition-colors"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
              </button>
              <button
                (click)="deleteEntry(entry.id)"
                class="w-7 h-7 flex items-center justify-center rounded-full text-ink-faint hover:text-danger hover:bg-danger-light cursor-pointer transition-colors"
              >
                <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
              </button>
            </div>
          </div>
        </div>
      }
    </div>
  } @empty {
    <div class="text-center py-12">
      <p class="text-ink-faint text-sm font-mono">Žiadne záznamy</p>
      <p class="text-ink-faint/60 text-xs mt-1">Pridajte prvý záznam vyššie</p>
    </div>
  }
</div>
