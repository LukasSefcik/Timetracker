<div class="min-h-screen bg-slate-900">
  <!-- Header -->
  <header class="bg-slate-800 border-b border-slate-700 px-4 py-3">
    <h1 class="text-white font-semibold text-lg">⏱ TimeTracker</h1>
  </header>

  <!-- Tabs -->
  <nav class="bg-slate-800 border-b border-slate-700 flex">
    @for (tab of tabs; track tab.key) {
      <button
        (click)="activeTab.set(tab.key)"
        class="px-6 py-3 text-sm font-medium cursor-pointer transition-colors"
        [class]="
          activeTab() === tab.key
            ? 'text-cyan-400 border-b-2 border-cyan-400'
            : 'text-slate-400 hover:text-white'
        "
      >
        {{ tab.label }}
      </button>
    }
  </nav>

  <!-- Tab content -->
  <main class="max-w-lg mx-auto py-4">
    @switch (activeTab()) {
      @case ("entries") {
        <app-entries />
      }
      @case ("summary") {
        <app-summary />
      }
      @case ("settings") {
        <app-settings />
      }
    }
  </main>
</div>
