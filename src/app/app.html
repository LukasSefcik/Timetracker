<div class="min-h-screen bg-cream flex flex-col">
  <!-- Header -->
  <header class="bg-surface border-b border-rule px-5 pt-3 pb-2">
    <div class="flex items-baseline gap-2">
      <h1 class="font-mono text-base font-medium tracking-tight text-ink">TimeTracker</h1>
      <span class="text-ink-faint text-xs font-mono">v1</span>
    </div>
  </header>

  <!-- Tab content -->
  <main class="flex-1 max-w-lg mx-auto w-full pb-20">
    @switch (activeTab()) {
      @case ("entries") {
        <app-entries />
      }
      @case ("summary") {
        <app-summary />
      }
      @case ("settings") {
        <app-settings />
      }
    }
  </main>

  <!-- Bottom navigation -->
  <nav class="fixed bottom-0 inset-x-0 bg-surface border-t border-rule safe-bottom">
    <div class="max-w-lg mx-auto flex">
      @for (tab of tabs; track tab.key) {
        <button
          (click)="activeTab.set(tab.key)"
          class="flex-1 flex flex-col items-center gap-0.5 py-2.5 cursor-pointer transition-colors"
          [class]="
            activeTab() === tab.key
              ? 'text-accent'
              : 'text-ink-faint hover:text-ink-light'
          "
        >
          <span class="text-lg leading-none">{{ tab.icon }}</span>
          <span class="text-[10px] font-medium tracking-wide uppercase">{{ tab.label }}</span>
        </button>
      }
    </div>
  </nav>
</div>
